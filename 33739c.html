<!DOCTYPE html>
<html lang="en" style="height: auto; min-height: 100%;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MERCBEX – Splash Screen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link id="heading-font-link" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link id="body-font-link" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['var(--font-heading-name)', 'sans-serif'],
            body: ['var(--font-body-name)', 'sans-serif'],
          },
          spacing: {
            base: 'var(--space-base)',
          },
          borderRadius: {
            small: 'var(--radius-small)',
            large: 'var(--radius-large)',
          },
          boxShadow: {
            custom: 'var(--shadow-custom)',
            'custom-hover': 'var(--shadow-custom-hover)',
          },
          colors: {
            brand: {
              dark: '#0F3D22',
              mid: '#1A5C34',
              light: '#2A7A48',
              lime: '#A8E63D',
              'lime-bright': '#C4F135',
              'lime-soft': '#D4F76A',
              'lime-pale': '#E8FBAA',
            }
          },
          keyframes: {
            progressLine: {
              '0%': { width: '0%' },
              '100%': { width: '100%' },
            },
            glowPulse: {
              '0%, 100%': { opacity: '0.6', transform: 'scale(1)' },
              '50%': { opacity: '1', transform: 'scale(1.08)' },
            },
            fadeUp: {
              '0%': { opacity: '0', transform: 'translateY(24px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            shimmer: {
              '0%': { backgroundPosition: '-200% center' },
              '100%': { backgroundPosition: '200% center' },
            },
            ringExpand: {
              '0%': { transform: 'scale(0.85)', opacity: '0.8' },
              '100%': { transform: 'scale(1.35)', opacity: '0' },
            }
          },
          animation: {
            progressLine: 'progressLine 3.2s cubic-bezier(0.4,0,0.2,1) forwards',
            glowPulse: 'glowPulse 2.8s ease-in-out infinite',
            fadeUp: 'fadeUp 0.9s ease-out forwards',
            'fadeUp-delay': 'fadeUp 0.9s ease-out 0.4s forwards',
            'fadeUp-delay2': 'fadeUp 0.9s ease-out 0.7s forwards',
            shimmer: 'shimmer 2.5s linear infinite',
            ringExpand: 'ringExpand 2.4s ease-out infinite',
            'ringExpand-delay': 'ringExpand 2.4s ease-out 1.2s infinite',
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --font-heading-name: 'Syne';
      --font-body-name: 'DM Sans';
      --font-heading: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --letter-spacing-heading: 0.5px;
      --letter-spacing-body: 0px;

      --space-base: 1rem;

      --radius-small: 6px;
      --radius-large: 16px;
      --border-width: 1.5px;

      --shadow-color: 168 230 61;
      --shadow-offset-x: 0px;
      --shadow-offset-y: 0px;
      --shadow-blur: 48px;
      --shadow-spread: 0px;
      --shadow-opacity: 0.35;
      --shadow-custom: 0px 0px 48px 0px rgba(168, 230, 61, 0.35);
      --shadow-custom-hover: 0px 0px 72px 0px rgba(168, 230, 61, 0.55);
    }

    .logo-glow {
      filter: drop-shadow(0 0 32px rgba(168, 230, 61, 0.7)) drop-shadow(0 0 64px rgba(168, 230, 61, 0.35));
    }

    .shimmer-text {
      background: linear-gradient(90deg, #A8E63D 0%, #C4F135 30%, #ffffff 50%, #C4F135 70%, #A8E63D 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }

    .progress-track {
      background: rgba(168, 230, 61, 0.15);
    }

    .progress-fill {
      background: linear-gradient(90deg, #A8E63D, #C4F135, #A8E63D);
      box-shadow: 0 0 12px rgba(168, 230, 61, 0.8), 0 0 24px rgba(168, 230, 61, 0.4);
      animation: progressLine 3.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .ring-1-anim {
      animation: ringExpand 2.4s ease-out infinite;
    }

    .ring-2-anim {
      animation: ringExpand 2.4s ease-out 1.2s infinite;
    }

    .tagline-hindi {
      font-family: 'DM Sans', sans-serif;
    }

    body {
      background-color: #0F3D22;
    }
  </style>
</head>
<body class="font-body" style="height: auto; min-height: 100%; background-color: #0F3D22;">

  <!-- Full-bleed splash container -->
  <div class="flex flex-col items-center justify-between" style="min-height: 100vh; background-color: #0F3D22; padding: 0;">

    <!-- Top spacer / subtle top branding strip -->
    <div class="w-full flex items-center justify-center pt-10 pb-0 opacity-0 animate-fadeUp" style="animation-delay: 0.1s; animation-fill-mode: forwards;">
      <div class="flex items-center gap-2">
        <div class="w-1 h-1 rounded-full" style="background-color: rgba(168,230,61,0.4);"></div>
        <span class="text-xs tracking-widest uppercase font-body" style="color: rgba(168,230,61,0.5); letter-spacing: 4px; font-size: 10px;">MERCBEX</span>
        <div class="w-1 h-1 rounded-full" style="background-color: rgba(168,230,61,0.4);"></div>
      </div>
    </div>

    <!-- Center: Logo + Tagline -->
    <div class="flex flex-col items-center justify-center flex-1 px-8" style="gap: 0;">

      <!-- Glow rings behind logo -->
      <div class="relative flex items-center justify-center" style="width: 220px; height: 220px;">

        <!-- Outer expanding ring 1 -->
        <div class="absolute rounded-full ring-1-anim" style="width: 200px; height: 200px; border: 1.5px solid rgba(168,230,61,0.25);"></div>

        <!-- Outer expanding ring 2 -->
        <div class="absolute rounded-full ring-2-anim" style="width: 200px; height: 200px; border: 1.5px solid rgba(168,230,61,0.18);"></div>

        <!-- Static ambient glow disc -->
        <div class="absolute rounded-full animate-glowPulse" style="width: 160px; height: 160px; background: radial-gradient(circle, rgba(168,230,61,0.18) 0%, rgba(168,230,61,0.06) 60%, transparent 100%);"></div>

        <!-- Logo shield -->
        <div class="relative z-10 logo-glow animate-glowPulse flex items-center justify-center" style="width: 120px; height: 120px;">
          <!-- Leaf-Shield SVG Logo -->
          <svg width="110" height="120" viewBox="0 0 110 120" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Shield base -->
            <path d="M55 4L8 22V58C8 84.5 28.5 108.5 55 116C81.5 108.5 102 84.5 102 58V22L55 4Z" fill="#1A5C34" stroke="#A8E63D" stroke-width="2.5"/>
            <!-- Inner shield highlight -->
            <path d="M55 12L16 27V58C16 80.5 33 101.5 55 108C77 101.5 94 80.5 94 58V27L55 12Z" fill="#0F3D22" opacity="0.6"/>
            <!-- Leaf shape -->
            <path d="M55 30C55 30 38 42 38 60C38 72.5 45.5 80 55 82C64.5 80 72 72.5 72 60C72 42 55 30 55 30Z" fill="#A8E63D" opacity="0.95"/>
            <!-- Leaf vein center -->
            <line x1="55" y1="32" x2="55" y2="80" stroke="#0F3D22" stroke-width="2" stroke-linecap="round"/>
            <!-- Leaf vein left -->
            <path d="M55 50 Q47 54 42 62" stroke="#0F3D22" stroke-width="1.5" stroke-linecap="round" fill="none"/>
            <!-- Leaf vein right -->
            <path d="M55 50 Q63 54 68 62" stroke="#0F3D22" stroke-width="1.5" stroke-linecap="round" fill="none"/>
            <!-- Leaf vein left 2 -->
            <path d="M55 62 Q48 65 44 72" stroke="#0F3D22" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.7"/>
            <!-- Leaf vein right 2 -->
            <path d="M55 62 Q62 65 66 72" stroke="#0F3D22" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.7"/>
            <!-- Stem -->
            <path d="M55 82 Q52 90 54 96" stroke="#A8E63D" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
          </svg>
        </div>
      </div>

      <!-- Brand name -->
      <div class="text-center mt-6 opacity-0" style="animation: fadeUp 0.9s ease-out 0.3s forwards;">
        <h1 class="font-heading shimmer-text" style="font-size: 42px; font-weight: 800; letter-spacing: 6px; line-height: 1;">MERCBEX</h1>
        <div class="mt-1" style="height: 1.5px; background: linear-gradient(90deg, transparent, rgba(168,230,61,0.6), transparent); width: 180px; margin: 8px auto 0;"></div>
      </div>

      <!-- Tagline block -->
      <div class="text-center mt-8 opacity-0" style="animation: fadeUp 0.9s ease-out 0.6s forwards; max-width: 320px;">
        <!-- English tagline -->
        <p class="font-body" style="color: rgba(255,255,255,0.88); font-size: 15px; font-weight: 400; letter-spacing: 0.5px; line-height: 1.5;">
          Smart Farming. Healthy Crops. Better Yields.
        </p>
        <!-- Divider dot row -->
        <div class="flex items-center justify-center gap-2 my-3">
          <div style="height: 1px; width: 40px; background: rgba(168,230,61,0.3);"></div>
          <div style="width: 4px; height: 4px; border-radius: 50%; background: rgba(168,230,61,0.6);"></div>
          <div style="height: 1px; width: 40px; background: rgba(168,230,61,0.3);"></div>
        </div>
        <!-- Hindi tagline -->
        <p class="tagline-hindi" style="color: rgba(168,230,61,0.85); font-size: 14px; font-weight: 400; letter-spacing: 0.3px; line-height: 1.6;">
          स्मार्ट खेती। स्वस्थ फसल। बेहतर उपज।
        </p>
      </div>

      <!-- Version badge -->
      <div class="mt-10 opacity-0" style="animation: fadeUp 0.9s ease-out 0.9s forwards;">
        <div class="flex items-center gap-2 px-4 py-1.5 rounded-small" style="border: 1px solid rgba(168,230,61,0.2); background: rgba(168,230,61,0.06);">
          <div style="width: 6px; height: 6px; border-radius: 50%; background: #A8E63D; box-shadow: 0 0 6px rgba(168,230,61,0.8);"></div>
          <span class="font-body" style="color: rgba(168,230,61,0.7); font-size: 11px; letter-spacing: 2px; font-weight: 500;">v2.4.1 · AGRI TECH</span>
        </div>
      </div>

    </div>

    <!-- Bottom section: progress bar + skip -->
    <div class="w-full px-8 pb-12 opacity-0" style="animation: fadeUp 0.9s ease-out 1.1s forwards;">

      <!-- Loading label -->
      <div class="flex items-center justify-between mb-3">
        <span class="font-body" style="color: rgba(255,255,255,0.35); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;">Loading</span>
        <a href="/api/copilot/prototype/7a9511ae-1a13-4561-8b0f-55d291c7aa2e/language-selection" class="font-body" style="color: rgba(168,230,61,0.6); font-size: 12px; font-weight: 500; text-decoration: none; letter-spacing: 0.5px; cursor: pointer; transition: color 0.2s;">
          Skip →
        </a>
      </div>

      <!-- Progress track -->
      <div class="w-full progress-track rounded-small overflow-hidden" style="height: 3px;">
        <div class="progress-fill h-full rounded-small" style="width: 0%;"></div>
      </div>

      <!-- Bottom nav hint -->
      <div class="flex items-center justify-center mt-8 gap-6">
        <a href="/api/copilot/prototype/7a9511ae-1a13-4561-8b0f-55d291c7aa2e/language-selection" class="font-body text-center" style="color: rgba(255,255,255,0.25); font-size: 11px; text-decoration: none; letter-spacing: 0.5px;">
          Language Selection →
        </a>
      </div>

      <!-- Bottom safe area indicator -->
      <div class="flex items-center justify-center mt-6">
        <div style="width: 120px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.15);"></div>
      </div>

    </div>

  </div>

  <script>
    // Auto-navigate to language selection after progress completes
    setTimeout(function() {
      // Progress bar auto-completes via CSS animation (3.2s)
      // After 3.5s, navigate to next screen
    }, 3500);

    // Hover effect on skip link
    const skipLink = document.querySelector('a[href="/api/copilot/prototype/7a9511ae-1a13-4561-8b0f-55d291c7aa2e/language-selection"]');
    if (skipLink) {
      skipLink.addEventListener('mouseenter', function() {
        this.style.color = 'rgba(168,230,61,0.9)';
      });
      skipLink.addEventListener('mouseleave', function() {
        this.style.color = 'rgba(168,230,61,0.6)';
      });
    }
  </script>

</body>
</html>
