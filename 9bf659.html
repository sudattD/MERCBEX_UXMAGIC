    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['var(--font-heading-name)', 'sans-serif'],
            body: ['var(--font-body-name)', 'sans-serif'],

          spacing: {
            base: 'var(--space-base)',
          },
          borderRadius: {
            small: 'var(--radius-small)',

  <style>
    :root {
      --font-heading-name: 'Syne';
      --font-body-name: 'DM Sans';
      --font-heading: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --letter-spacing-heading: 0.5px;
      --letter-spacing-body: 0px;

      --space-base: 1rem;

      --radius-small: 6px;
      --radius-large: 16px;
      --border-width: 1.5px;

      --shadow-color: 168 230 61;
      --shadow-offset-x: 0px;
      --shadow-offset-y: 0px;
      --shadow-blur: 48px;
      --shadow-spread: 0px;
      --shadow-opacity: 0.35;
      --shadow-custom: 0px 0px 48px 0px rgba(168, 230, 61, 0.35);
      --shadow-custom-hover: 0px 0px 72px 0px rgba(168, 230, 61, 0.55);
    }

    .logo-glow {
      filter: drop-shadow(0 0 32px rgba(168, 230, 61, 0.7)) drop-shadow(0 0 64px rgba(168, 230, 61, 0.35));
    }

    .shimmer-text {
      background: linear-gradient(90deg, #A8E63D 0%, #C4F135 30%, #ffffff 50%, #C4F135 70%, #A8E63D 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }

    .progress-track {
      background: rgba(168, 230, 61, 0.15);
    }

    .progress-fill {
      background: linear-gradient(90deg, #A8E63D, #C4F135, #A8E63D);
      box-shadow: 0 0 12px rgba(168, 230, 61, 0.8), 0 0 24px rgba(168, 230, 61, 0.4);
      animation: progressLine 3.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .ring-1-anim {
      animation: ringExpand 2.4s ease-out infinite;
    }

    .ring-2-anim {
      animation: ringExpand 2.4s ease-out 1.2s infinite;
    }

    .tagline-hindi {
      font-family: 'DM Sans', sans-serif;
    }

    /* Language card styles */
    .lang-card {
      background: #FFFFFF;
      border: 2px solid #E8EDE9;
      border-radius: var(--radius-large);
      cursor: pointer;
      transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .lang-card:hover {
      border-color: rgba(168, 230, 61, 0.5);
      box-shadow: 0 4px 20px rgba(168, 230, 61, 0.15);
      transform: translateY(-2px);
    }

    .lang-card.selected {
      border-color: #A8E63D;
      background: linear-gradient(135deg, #FAFFF4 0%, #F2FBDF 100%);
      box-shadow: 0 4px 24px rgba(168, 230, 61, 0.25), 0 0 0 1px rgba(168, 230, 61, 0.3);
    }

    .lang-card.selected .checkmark-circle {
      opacity: 1;
      transform: scale(1);
    }

    .lang-card .checkmark-circle {
      opacity: 0;
      transform: scale(0.6);
      transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .lang-card.selected .card-bg-accent {
      opacity: 1;
    }

    .card-bg-accent {
      opacity: 0;
      transition: opacity 0.22s ease;
    }

    /* Continue button */
    .continue-btn {
      background: linear-gradient(135deg, #A8E63D 0%, #C4F135 100%);
      border-radius: 999px;
      transition: all 0.22s ease;
      box-shadow: 0 4px 20px rgba(168, 230, 61, 0.4);
    }

    .continue-btn:hover {
      box-shadow: 0 6px 32px rgba(168, 230, 61, 0.6);
      transform: translateY(-1px);
    }

    .continue-btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 12px rgba(168, 230, 61, 0.3);
    }

    .continue-btn:disabled {
      background: linear-gradient(135deg, #C8D4B8 0%, #D4DEC4 100%);
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    /* Step indicator dots */
    .step-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #D4DEC4;
      transition: all 0.22s ease;
    }

    .step-dot.active {
      width: 20px;
      border-radius: 3px;
      background: #A8E63D;
    }

    /* Fade in animation for cards */
    @keyframes cardFadeIn {
      0% { opacity: 0; transform: translateY(16px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .card-anim-1 { animation: cardFadeIn 0.5s ease-out 0.1s both; }
    .card-anim-2 { animation: cardFadeIn 0.5s ease-out 0.18s both; }
    .card-anim-3 { animation: cardFadeIn 0.5s ease-out 0.26s both; }
    .card-anim-4 { animation: cardFadeIn 0.5s ease-out 0.34s both; }
    .card-anim-5 { animation: cardFadeIn 0.5s ease-out 0.42s both; }
    .card-anim-6 { animation: cardFadeIn 0.5s ease-out 0.50s both; }

    @keyframes headerFadeIn {
      0% { opacity: 0; transform: translateY(-12px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .header-anim { animation: headerFadeIn 0.5s ease-out 0s both; }
    .heading-anim { animation: cardFadeIn 0.6s ease-out 0.05s both; }
  </style>
</head>

    let selectedLang = 'hindi';

    function selectLang(card) {
      // Deselect all
      document.querySelectorAll('.lang-card').forEach(function(c) {
        c.classList.remove('selected');
        var bar = c.querySelector('[style*="gradient(90deg, #A8E63D"]');
        if (bar) bar.style.opacity = '0';
      });

      // Select clicked
      card.classList.add('selected');
      selectedLang = card.getAttribute('data-lang');

      // Show active bar
      var activeBar = card.querySelector('div[style*="gradient(90deg, #A8E63D"]');
      if (activeBar) activeBar.style.opacity = '1';

      // Update continue button state
      updateContinueBtn();
    }

    function updateContinueBtn() {
      var btn = document.getElementById('continueBtn');
      if (selectedLang) {
        btn.style.pointerEvents = 'auto';
        btn.style.opacity = '1';
      }
    }

    // Initialize - Hindi is pre-selected
    updateContinueBtn();
  </script>

</body>
</html>
